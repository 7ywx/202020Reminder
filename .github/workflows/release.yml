name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Run lint
        run: uv run ruff check . --output-format=github

      - name: Build executable
        run: uv run python -m PyInstaller 202020Reminder.spec

      - name: Rename executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item dist/202020Reminder.exe release/202020Reminder-${{ github.ref_name }}-windows-x64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: 202020Reminder-${{ github.ref_name }}-windows-x64
          path: release/202020Reminder-${{ github.ref_name }}-windows-x64.exe
