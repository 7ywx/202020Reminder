name: Bug report
about: Report a bug in 202020Reminder
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Please describe the issue clearly.
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: v0.2.0
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the app
        2. Open settings
        3. ...
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
